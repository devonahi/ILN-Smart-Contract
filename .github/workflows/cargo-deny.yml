name: Cargo Deny

# Supply-chain audit for the Soroban contracts workspace:
# security advisories, licence compliance, and duplicate dependencies.

on:
    push:
        branches: [main]
        paths:
            - "contracts/**"
            - ".github/workflows/cargo-deny.yml"
    pull_request:
        branches: [main]
        paths:
            - "contracts/**"
            - ".github/workflows/cargo-deny.yml"
    schedule:
        # Re-run weekly so newly published advisories are caught even when the
        # dependency tree itself has not changed.
        - cron: "0 6 * * 1"
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: cargo-deny-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    cargo-deny:
        name: Dependency Audit (cargo-deny)
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v6

            - name: Run cargo-deny
              uses: EmbarkStudios/cargo-deny-action@v2
              with:
                  manifest-path: Cargo.toml
                  command: check advisories licenses bans sources
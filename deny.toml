[graph]
targets = [
  "wasm32-unknown-unknown",
  "x86_64-unknown-linux-gnu",
]
all-features = true

[output]
feature-depth = 1

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
  # paste is unmaintained (RUSTSEC-2024-0436); pulled in transitively via
  # soroban-wasmi, no upgrade available. Not a vulnerability.
  "RUSTSEC-2024-0436",
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "CC0-1.0",
  "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "deny"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
deny = [
  { name = "openssl" },
  { name = "openssl-sys" },
]
skip = [
  { name = "darling", version = "=0.20.11" },
  { name = "darling_core", version = "=0.20.11" },
  { name = "darling_macro", version = "=0.20.11" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
